version: '3.8'

services:
  # MongoDB for data storage
  mongodb:
    image: mongo:6.0
    container_name: healthcare-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - healthcare-network

  # Backend Node 1 (Primary)
  backend-node-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthcare-backend-1
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/healthcare?authSource=admin
      RPC_URL: ${RPC_URL}
      PRIVATE_KEY: ${PRIVATE_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MEDICAL_RECORDS_ADDRESS: ${MEDICAL_RECORDS_ADDRESS}
      BLOOD_DONATION_ADDRESS: ${BLOOD_DONATION_ADDRESS}
      ORGAN_DONATION_ADDRESS: ${ORGAN_DONATION_ADDRESS}
      NODE_NAME: node-1
      SYNC_PEERS: backend-node-2,backend-node-3
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend Node 2 (Secondary)
  backend-node-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthcare-backend-2
    ports:
      - "5001:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/healthcare?authSource=admin
      RPC_URL: ${RPC_URL}
      PRIVATE_KEY: ${PRIVATE_KEY_2}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MEDICAL_RECORDS_ADDRESS: ${MEDICAL_RECORDS_ADDRESS}
      BLOOD_DONATION_ADDRESS: ${BLOOD_DONATION_ADDRESS}
      ORGAN_DONATION_ADDRESS: ${ORGAN_DONATION_ADDRESS}
      NODE_NAME: node-2
      SYNC_PEERS: backend-node-1,backend-node-3
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend Node 3 (Tertiary)
  backend-node-3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthcare-backend-3
    ports:
      - "5002:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/healthcare?authSource=admin
      RPC_URL: ${RPC_URL}
      PRIVATE_KEY: ${PRIVATE_KEY_3}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MEDICAL_RECORDS_ADDRESS: ${MEDICAL_RECORDS_ADDRESS}
      BLOOD_DONATION_ADDRESS: ${BLOOD_DONATION_ADDRESS}
      ORGAN_DONATION_ADDRESS: ${ORGAN_DONATION_ADDRESS}
      NODE_NAME: node-3
      SYNC_PEERS: backend-node-1,backend-node-2
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthcare-frontend
    ports:
      - "3000:5173"
    environment:
      VITE_API_URL: http://backend-node-1:5000
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    depends_on:
      - backend-node-1
    networks:
      - healthcare-network

  # Load Balancer (Nginx)
  nginx:
    image: nginx:latest
    container_name: healthcare-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-node-1
      - backend-node-2
      - backend-node-3
    networks:
      - healthcare-network

volumes:
  mongodb_data:

networks:
  healthcare-network:
    driver: bridge
