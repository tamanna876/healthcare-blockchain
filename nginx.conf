events {
    worker_connections 1024;
}

http {
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m;

    # Upstream backend nodes
    upstream backend_nodes {
        least_conn;
        server backend-node-1:5000 weight=3;
        server backend-node-2:5000 weight=2;
        server backend-node-3:5000 weight=1;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;

        # API endpoints - round robin with caching
        location /api/ {
            proxy_pass http://backend_nodes;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Cache GET requests
            proxy_cache api_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_methods GET HEAD;
            proxy_cache_key "$scheme$request_method$host$request_uri";
        }

        # Health check endpoint
        location /health {
            proxy_pass http://backend_nodes;
            access_log off;
        }

        # Medical records - no caching
        location /records/ {
            proxy_pass http://backend_nodes;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # File uploads
        location /upload {
            proxy_pass http://backend_nodes;
            client_max_body_size 50M;
            proxy_request_buffering off;
        }

        # Root endpoint
        location / {
            proxy_pass http://backend_nodes;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }

    # HTTPS configuration (for production)
    # server {
    #     listen 443 ssl http2;
    #     server_name _;

    #     ssl_certificate /etc/nginx/certs/certificate.crt;
    #     ssl_certificate_key /etc/nginx/certs/private.key;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;

    #     # Same location blocks as above
    # }

    # Redirect HTTP to HTTPS (for production)
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }
}
